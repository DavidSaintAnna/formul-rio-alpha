<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Animes</title>
</head>

<body>
    <div>
        <form>
            <p>Nome:</p>
            <input type="text" name="nome" placeholder="digite seu nome" />
            <p>E-mail</p>
            <input type="email" name="email" />
            <p>Genêro</p>
            <input type="radio" name="genêro" id="homem" value="homem" />
            <label for="homem">Homem</label><br>
            <input type="radio" name="genêro" id="mulher" value="mulher" />
            <label for="mulher">Mulher</label><br>
            <input type="radio" name="genêro" id="outro" value="outro" />
            <label for="outro">Outro</label><br>
            <label for="pass">Password (4 máximo ):</label> 
            <input type="password" id="pass" name="password"
                   maxlength="4" required><br>
            <br>
            <label for="start">Start date:</label>
            <input type="date" id="start" name="trip-start"
       value="2021-10-7"
            min="2021-10-7" max="2021-12-31">
            <label for="msg">Em que momento você teve contato com Animes?</label><br>
            <textarea rows="15" cols="45" id="msg"></textarea>
            <p> Qual desses animes você recomendaria?</p>
           <fieldset>
            <input type="checkbox" name="animes" id="naruto" value="naruto" />
            <label for="naruto">Naruto</label><br>
            <input type="checkbox" name="animes" id="pokemon" value="pokemon" />
            <label for="pokemon">Pokemon</label><br>
            <input type="checkbox" name="animes" id="bleach" value="bleach" />
            <label for="bleach">Bleach</label><br>
        </fieldset>
            <br>
            <input type="range" id="volume" name="volume"
            min="0" max="11">
            <label for="volume">Volume</label>
             <input type="reset" value="Reset">
            <input type="submit" id="submit" value="Submit">
      
           </form>
    </div>
</body>
</html>
